<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- High-contrast gradients showing distinct team colors -->
    <linearGradient id="gradOuter" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" /> <!-- Blue -->
      <stop offset="100%" stop-color="#00f5ff" /> <!-- Neon Cyan -->
    </linearGradient>
    <linearGradient id="gradMiddle" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" /> <!-- Deep Purple -->
      <stop offset="100%" stop-color="#ff007f" /> <!-- Hot Pink -->
    </linearGradient>
    <linearGradient id="gradInner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b00" /> <!-- Deep Orange -->
      <stop offset="100%" stop-color="#ff003c" /> <!-- Vivid Red -->
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Concentric Background Tracks (Semi-circles) -->
  <circle cx="50" cy="62" r="38" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="119.4 238.8" transform="rotate(-180 50 62)" />
  <circle cx="50" cy="62" r="28" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="88 176" transform="rotate(-180 50 62)" />
  <circle cx="50" cy="62" r="18" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="56.6 113.1" transform="rotate(-180 50 62)" />

  <!-- Concentric Active Arcs (Fandom scores) -->
  <!-- Outer: 75% filled (89.5px) -->
  <circle cx="50" cy="62" r="38" fill="none" stroke="url(#gradOuter)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="89.5 238.8" transform="rotate(-180 50 62)" />
  
  <!-- Middle: 55% filled (48.4px) -->
  <circle cx="50" cy="62" r="28" fill="none" stroke="url(#gradMiddle)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="48.4 176.0" transform="rotate(-180 50 62)" />
  
  <circle cx="50" cy="62" r="18" fill="none" stroke="url(#gradInner)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="19.8 113.1" transform="rotate(-180 50 62)" />

  <!-- Mathematically Aligned End Caps (Circular Knobs) -->
  <!-- Outer Cap (75% end: 315 deg) -->
  <circle cx="76.9" cy="35.1" r="3.2" fill="#ffffff" stroke="url(#gradOuter)" stroke-width="1.8" />
  
  <!-- Middle Cap (55% end: 279 deg) -->
  <circle cx="54.4" cy="34.3" r="3.2" fill="#ffffff" stroke="url(#gradMiddle)" stroke-width="1.8" />
  
  <!-- Inner Cap (35% end: 243 deg) -->
  <circle cx="41.8" cy="46.0" r="3.2" fill="#ffffff" stroke="url(#gradInner)" stroke-width="1.8" />
</svg>
